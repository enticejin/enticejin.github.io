<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 关键：设置视口，确保在手机上正常缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基础数值明细</title>
    <style>
        /* 全局样式重置 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        /* 容器卡片样式 */
        .card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            padding: 20px;
            max-width: 600px; /* 限制最大宽度，居中显示 */
            margin: 0 auto;
        }

        /* 标题样式 */
        h2 {
            font-size: 18px;
            font-weight: bold;
            margin: 0 0 15px 0;
            color: #1a1a1a;
        }

        h3 {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 15px 0;
            color: #333;
            border-left: 4px solid #007bff; /* 左侧装饰条 */
            padding-left: 10px;
        }

        /* 表格样式 */
        table {
            width: 100%;
            border-collapse: collapse; /* 合并边框 */
            font-size: 14px;
        }

        th, td {
            border: 1px solid #e0e0e0; /* 浅灰色边框 */
            padding: 12px 8px;
            text-align: center; /* 内容居中 */
        }

        /* 表头背景色（如果需要区分表头） */
        thead th {
            background-color: #fafafa;
            font-weight: 600;
        }

        /* 偶数行背景色，增加可读性（可选） */
        tbody tr:nth-child(even) {
            background-color: #fcfcfc;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- 顶部日期标题 -->
        <h2>基础数值明细及校验：2023 年 10 月 1 日</h2>

        <!-- 小标题 -->
        <h3>一、基础数值明细（含标注）</h3>

        <!-- 数据表格 -->
        <table>
            <thead>
                <tr>
                    <th>数值 / 标注</th>
                    <th>数值 / 标注</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>700 - 540 平</td>
                    <td>140</td>
                </tr>
                <tr>
                    <td>230</td>
                    <td>120</td>
                </tr>
                <tr>
                    <td>345</td>
                    <td>60</td>
                </tr>
                <tr>
                    <td>950</td>
                    <td>50</td>
                </tr>
                <tr>
                    <td>160</td>
                    <td>110 - 15</td>
                </tr>
                <tr>
                    <td>300</td>
                    <td>45</td>
                </tr>
                <tr>
                    <td>180</td>
                    <td>200</td>
                </tr>
                <tr>
                    <td>300</td>
                    <td>260 - 15</td>
                </tr>
                <tr>
                    <td>700</td>
                    <td>140</td>
                </tr>
                <tr>
                    <td>50</td>
                    <td>295</td>
                </tr>
                <tr>
                    <td>100</td>
                    <td>300 - 15</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
